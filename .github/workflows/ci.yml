# CI workflow — runs on every push and PR
# Demonstrates: matrix builds, dependency caching, artifacts, self-hosted runner targeting

name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint
    runs-on: self-hosted          # <-- your EC2 runner picks this up
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"             # caches ~/.npm between runs

      - name: Install dependencies
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== Directory contents ==="
          ls -la
          echo "=== npm install ==="
          npm install --include=dev
          echo "=== node_modules/.bin after install ==="
          ls node_modules/.bin/ | head -20 || echo "node_modules/.bin missing"

      - name: Debug install
        run: |
          echo "node: $(node --version)"
          echo "npm:  $(npm --version)"
          echo "NODE_ENV: ${NODE_ENV:-unset}"
          ls node_modules/.bin/eslint && echo "eslint binary: OK" || echo "eslint binary: MISSING"

      - name: Run ESLint
        run: ./node_modules/.bin/eslint src/ tests/

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: self-hosted
    needs: lint                    # only runs if lint passes

    strategy:
      fail-fast: false             # keep running other matrix legs on failure
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm install --include=dev

      - name: Run tests with coverage
        run: npm test -- --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./test-results

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.node-version == '20'   # only upload once
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()               # upload even on test failure for debugging
        with:
          name: test-results-node${{ matrix.node-version }}
          path: test-results/
          retention-days: 7

  build:
    name: Build & Package
    runs-on: self-hosted
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --include=dev

      - name: Build
        run: npm run build
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ github.ref_name }}-${{ github.run_number }} \
            --build-arg BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --build-arg COMMIT_SHA=${{ github.sha }} \
            -t cicd-practice-app:${{ github.sha }} \
            -t cicd-practice-app:latest \
            .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: dist/
          retention-days: 14
